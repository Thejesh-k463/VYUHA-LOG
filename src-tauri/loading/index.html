<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vyuha</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1rem; background: #0a0e14; color: #e6edf3;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .logo {
        width: 56px; height: 56px; border-radius: 12px; background: #2dd4bf;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 700; color: #04110f;
      }
      .name { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; }
      .sub { font-size: 12px; color: #8a98a7; }
      .spinner {
        width: 22px; height: 22px; border: 2px solid #1f2b3a; border-top-color: #2dd4bf;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="logo">व</div>
    <div class="name">VYUHA</div>
    <div class="spinner"></div>
    <div class="sub">Starting your local trade journal…</div>
  </body>
</html>
