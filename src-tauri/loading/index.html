<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vyuha</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1.1rem; color: #e6edf3; overflow: hidden;
        background: radial-gradient(1100px 520px at 50% -10%, #10202a 0%, #0a0e14 55%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      /* C10 — branded splash: the व mark breathes inside a soft teal halo while
         the Node sidecar boots; a ticker line shimmers underneath. */
      .halo {
        position: relative; width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
      }
      .halo::before, .halo::after {
        content: ""; position: absolute; inset: 0; border-radius: 24px;
        border: 1px solid rgba(45, 212, 191, 0.35);
        animation: ripple 2.2s ease-out infinite;
      }
      .halo::after { animation-delay: 1.1s; }
      .logo {
        width: 64px; height: 64px; border-radius: 16px;
        background: linear-gradient(150deg, #2dd4bf, #14b8a6 60%, #0f766e);
        box-shadow: 0 0 42px -6px rgba(45, 212, 191, 0.55), inset 0 1px 0 rgba(255,255,255,0.25);
        display: flex; align-items: center; justify-content: center;
        font-size: 32px; font-weight: 700; color: #04110f;
        animation: breathe 2.2s ease-in-out infinite;
      }
      .name { font-size: 19px; font-weight: 650; letter-spacing: 0.28em; margin-left: 0.28em; }
      .tag { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #8a98a7; margin-top: -0.7rem; }
      .track {
        width: 180px; height: 3px; border-radius: 99px; overflow: hidden;
        background: #1f2b3a; margin-top: 0.4rem;
      }
      .track::before {
        content: ""; display: block; width: 40%; height: 100%; border-radius: 99px;
        background: linear-gradient(90deg, transparent, #2dd4bf, transparent);
        animation: slide 1.2s ease-in-out infinite;
      }
      .sub { font-size: 11.5px; color: #8a98a7; }
      .foot { position: fixed; bottom: 14px; font-size: 10px; letter-spacing: 0.1em; color: #56657a; }
      @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @keyframes ripple { 0% { transform: scale(0.72); opacity: 0.9; } 100% { transform: scale(1.22); opacity: 0; } }
      @keyframes slide { 0% { transform: translateX(-110%); } 100% { transform: translateX(390%); } }
      @media (prefers-reduced-motion: reduce) {
        .logo, .halo::before, .halo::after, .track::before { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="halo"><div class="logo">व</div></div>
    <div class="name">VYUHA</div>
    <div class="tag">Trade Journal</div>
    <div class="track"></div>
    <div class="sub">Starting your local trade journal…</div>
    <div class="foot">LOCAL · OFFLINE · YOUR DATA STAYS HERE</div>
  </body>
</html>
