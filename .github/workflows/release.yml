name: Release

# Push a tag like v1.10.0 (matching package.json / tauri.conf.json / Cargo.toml —
# keep them in sync with `npm run bump-version <version>`) to build the Windows
# installer and attach it to a DRAFT GitHub Release for review before publishing.
#
# NOT YET WIRED (needs secrets/decisions only a maintainer can provide):
#   - Code signing: add WINDOWS_CERTIFICATE (base64 .pfx) + WINDOWS_CERTIFICATE_PASSWORD
#     secrets (or switch to Azure Trusted Signing) and pass them to tauri-action's env.
#     Until then this produces the same UNSIGNED installer as a local build.
#   - Auto-update: requires adding @tauri-apps/plugin-updater + a signing keypair
#     (`tauri signer generate`) + an `updater` block in tauri.conf.json, and hosting
#     latest.json somewhere the app checks. Separate follow-up, not part of this workflow.

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build & publish Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + unit tests (release gate)
        run: |
          npm run typecheck
          npm test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Vyuha ${{ github.ref_name }}"
          releaseBody: "See docs/INSTITUTIONAL_GRADE_ROADMAP.md for what changed. Unsigned installer — Windows SmartScreen may warn on first run until code signing is configured (see workflow comments)."
          releaseDraft: true
          prerelease: false
          # Assembles desktop-dist (standalone Next server + seed template DB) before
          # `tauri build` packages the Rust sidecar + NSIS installer.
          args: ""
          beforeBuildCommand: "npm run build && node scripts/build-desktop.mjs"
