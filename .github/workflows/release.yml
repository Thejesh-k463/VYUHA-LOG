name: Release

# Push a tag like v1.10.0 (matching package.json / tauri.conf.json / Cargo.toml —
# keep them in sync with `npm run bump-version <version>`) to build the Windows
# installer and attach it to a DRAFT GitHub Release for review before publishing.
#
# AUTO-UPDATE (wired): tauri-plugin-updater checks the latest PUBLISHED release's
# latest.json on startup. This workflow signs the updater artifacts with the vendor
# keypair — REQUIRES the repo secret TAURI_SIGNING_PRIVATE_KEY (contents of the local
# `updater-private.key`, which is gitignored). Without the secret, the build fails at
# the signing step: add it under Settings → Secrets and variables → Actions.
# The release stays a DRAFT — updates only reach users once you press Publish.
#
# CODE SIGNING (prepared, dormant until secrets exist — see docs/CODE_SIGNING.md):
# when the four AZURE_* secrets are configured, the workflow installs
# trusted-signing-cli and builds with src-tauri/tauri.signed.conf.json overlaid,
# which signs the exe + installer via Azure Trusted Signing. With no secrets the
# extra steps skip and the installer ships unsigned exactly as before.

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build & publish Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + unit tests (release gate)
        run: |
          npm run typecheck
          npm test

      # The Next.js standalone build + desktop-dist assembly run via
      # `build.beforeBuildCommand` in tauri.conf.json ("npm run build && npm run
      # desktop:bundle"), which `tauri build` executes — locally AND here. History:
      # passing beforeBuildCommand as a tauri-action `with:` input is silently ignored
      # (that caused the original broken release), and building only via explicit CI
      # steps left LOCAL `tauri build` shipping a stale desktop-dist (the v1.12–v1.20
      # local installers bug). The conf field is the one mechanism both paths share —
      # do NOT reintroduce explicit build steps here or a stale bundle can ship again.
      - name: Install trusted-signing-cli (only when code-signing secrets exist)
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        run: cargo install trusted-signing-cli --locked

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Azure Trusted Signing (no-ops while the secrets are empty)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        with:
          # Overlay the signCommand config only when signing is configured.
          args: ${{ secrets.AZURE_CLIENT_ID != '' && '--config src-tauri/tauri.signed.conf.json' || '' }}
          tagName: ${{ github.ref_name }}
          releaseName: "Vyuha ${{ github.ref_name }}"
          releaseBody: "See docs/INSTITUTIONAL_GRADE_ROADMAP.md for what changed."
          releaseDraft: true
          prerelease: false
